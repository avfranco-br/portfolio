site_name: Ideas to Life | Architecture & Governance
site_description: Operational Architecture, Governance Systems, and Sustainable Transformation
site_author: Alexandre Franco
site_url: https://avfranco-br.github.io/portfolio/

theme:
  name: material
  favicon: assets/images/favicon.png
  icon:
    logo: material/library
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - toc.integrate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

plugins:
  - search
  - roamlinks
  - minify:
      minify_html: true
  - social

nav:
  - Home: index.md
  - Architecture Philosophy: architecture-philosophy.md
  - About: about.md
  - Selected Work: selected-work.md
  - Enterprise Transformation:
      - BAT: narratives/bat-transformation.md
      - BBC Studios: narratives/bbc-studios-digital-evolution.md
  - AI Native Systems:
      - EA4ALL: narratives/ea4all.md
      - Runner Agentic Intelligence: narratives/runner-agentic-intelligence.md
  - Governance Systems:
      - Continuous Architecture System (CAS): narratives/cas.md
      - Governance Aware Coding Agent Collaboration: narratives/cas-coding-agent-collaboration.md
  - Contact: contact.md
